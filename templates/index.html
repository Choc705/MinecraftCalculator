<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Material Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='redstoneIcon.png') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 32px;
        }

        .panel {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        select, input[type="number"], input[type="text"] {
            font-family: Arial, sans-serif;
            font-size: 14px;
            padding: 9px 12px;
            background-color: #fafafa;
            color: #1a1a1a;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            outline: none;
            flex: 1;
            transition: border-color 0.15s;
        }

        select:focus, input:focus {
            border-color: #aaa;
            background-color: #fff;
        }

        input[type="number"] {
            width: 80px;
            flex: 0 0 80px;
        }

        .btn {
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: background-color 0.15s, transform 0.05s;
            white-space: nowrap;
        }

        .btn:active { transform: scale(0.97); }

        .btn-ghost {
            background-color: #f0f0f0;
            color: #444;
        }

        .btn-ghost:hover { background-color: #e5e5e5; }

        .btn-primary {
            background-color: #e05555;
            color: #fff;
        }

        .btn-primary:hover { background-color: #cc4444; }

        .btn-danger {
            background-color: #fce8e8;
            color: #c0392b;
        }

        .btn-danger:hover { background-color: #f7d0d0; }

        #add-btn { margin-top: 8px; }

        #calc-btn {
            flex: 1;
            font-size: 14px;
        }

        .result-item {
            background-color: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .material-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            text-transform: capitalize;
            flex: 1;
        }

        .material-amount {
            font-size: 12px;
            color: #888;
            text-align: right;
        }

        .material-stacks {
            margin-top: 2px;
            font-size: 14px;
            font-weight: 600;
            color: #e05555;
            text-align: right;
        }

        .choice-item { margin-bottom: 20px; }

        .choice-label {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .choice-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            transition: background-color 0.1s;
        }

        .choice-option:hover { background-color: #fafafa; }

        .choice-option input[type="radio"] {
            flex: 0 0 auto;
            width: auto;
            accent-color: #e05555;
        }

        #results { margin-top: 8px; }

        .results-title {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .hidden { display: none; }

        #recipe-message { margin-top: 12px; font-size: 13px; display: none; }

        .recipe-card {
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .recipe-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            text-transform: capitalize;
            margin-bottom: 8px;
        }

        .recipe-variant {
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .recipe-variant-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .recipe-edit-form {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e5e5e5;
        }

        .recipe-edit-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .btn-sm {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .list-card {
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            background-color: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .list-card-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            flex: 1;
        }

        .list-card-items {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .list-card-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .empty-state {
            font-size: 13px;
            color: #aaa;
            text-align: center;
            padding: 20px 0;
        }
</style>
</head>
<body>
    <div class="container">
        <h1>MINECRAFT<br>Material Calculator</h1>
        <p class="subtitle">Calculate raw materials from finished items</p>

        <div class="panel">
            <div class="panel-title">Shopping List</div>
            <div id="item-list">
                <div class="row">
                    <select name="item">
                        <optgroup label="Craftable Items">
                            {% for item in recipes %}
                            <option value="{{ item }}">{{ item.replace("_", " ").title() }}</option>
                            {% endfor %}
                        </optgroup>
                        <optgroup label="Raw Materials">
                            {% for material in raw_materials %}
                            <option value="{{ material }}">{{ material.replace("_", " ").title() }}</option>
                            {% endfor %}
                        </optgroup>
                    </select>
                    <input type="number" name="quantity" value="1" min="1">
                    <button class="btn btn-danger" onclick="removeRow(this)">X</button>
                </div>
            </div>
            <button class="btn btn-ghost" id="add-btn" onclick="addRow()">+ Add Item</button>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button class="btn btn-primary" id="calc-btn" onclick="startCalculate()">Calculate</button>
                <button class="btn btn-ghost" style="white-space: nowrap;" onclick="saveCurrentList()">Save List</button>
            </div>
        </div>

        <div class="panel hidden" id="choices-panel">
            <div class="panel-title">Choose Recipes</div>
            <p style="font-size: 14px; color: #aaa; margin-bottom: 16px;">Some items have multiple recipes — pick which materials you want to use:</p>
            <div id="choices-list"></div>
            <button class="btn btn-primary" style="margin-top: 16px; width: 100%; padding: 14px; font-size: 14px;" onclick="confirmCalculate()">Calculate</button>
        </div>

        <div class="panel hidden" id="results-panel">
            <div class="results-title">Raw Materials Needed</div>
            <div id="results"></div>
        </div>

        <div class="panel">
            <button class="btn btn-ghost" style="width: 100%; text-align: left; padding: 4px 0; font-size: 14px; font-weight: 600; background: none; border: none; cursor: pointer; color: #1a1a1a;" onclick="toggleSavedLists()">
                <span id="saved-lists-toggle-label">+ Saved Lists</span>
            </button>

            <div id="saved-lists-panel" class="hidden">
                <div style="border-top: 1px solid #e5e5e5; margin: 16px 0;"></div>
                <div id="saved-lists-content"></div>
            </div>
        </div>

        <div class="panel">
            <button class="btn btn-ghost" style="width: 100%; text-align: left; padding: 4px 0; font-size: 14px; font-weight: 600; background: none; border: none; cursor: pointer; color: #1a1a1a;" onclick="toggleRecipeEditor()">
                <span id="recipe-editor-toggle-label">+ View / Edit Recipes</span>
            </button>

            <div id="recipe-editor" class="hidden">
                <div style="border-top: 1px solid #e5e5e5; margin: 16px 0;"></div>
                <div id="recipe-editor-list"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Add New Recipe</div>

            <div style="margin-bottom: 10px;">
                <div style="font-size: 12px; color: #aaa; margin-bottom: 6px;">Item Name</div>
                <input type="text" id="new-item-name" placeholder="e.g. oak trapdoor" style="width: 100%;">
            </div>

            <div style="margin-bottom: 10px;">
                <div style="font-size: 12px; color: #aaa; margin-bottom: 6px;">Output Amount</div>
                <input type="number" id="new-item-output" value="1" min="1" style="width: 100%; flex: none;">
            </div>

            <div class="panel-title" style="margin-top: 16px;">Ingredients</div>
            <div id="ingredient-list">
                <div class="row">
                    <input type="text" name="ingredient-name" placeholder="e.g. oak log">
                    <input type="number" name="ingredient-amount" value="1" min="1">
                    <button class="btn btn-danger" onclick="removeIngredient(this)">X</button>
                </div>
            </div>

            <button class="btn btn-ghost" style="margin-top: 8px;" onclick="addIngredient()">+ Add Ingredient</button>
            <button class="btn btn-primary" style="margin-top: 16px; width: 100%; padding: 14px; font-size: 14px;" onclick="saveRecipe()">Save Recipe</button>
            <div id="recipe-message" style="margin-top: 12px; font-size: 7px; display: none;"></div>
        </div>
    </div>

    <script>
        let pendingItems = [];

        function addRow() {
            const list = document.getElementById("item-list");
            const first = list.querySelector(".row");
            const newRow = first.cloneNode(true);
            newRow.querySelector("input").value = 1;
            list.appendChild(newRow);
        }

        function removeRow(btn) {
            const list = document.getElementById("item-list");
            if (list.querySelectorAll(".row").length > 1) {
                btn.parentElement.remove();
            }
        }

        async function startCalculate() {
            const rows = document.querySelectorAll("#item-list .row");
            pendingItems = [];
            rows.forEach(row => {
                const item = row.querySelector("select").value;
                const quantity = parseInt(row.querySelector("input").value);
                if (quantity > 0) pendingItems.push({ item, quantity });
            });

            const response = await fetch("/get_choices", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: pendingItems })
            });

            const neededChoices = await response.json();

            if (Object.keys(neededChoices).length === 0) {
                confirmCalculate();
                return;
            }

            const choicesList = document.getElementById("choices-list");
            choicesList.innerHTML = "";

            for (const [item, data] of Object.entries(neededChoices)) {
                const div = document.createElement("div");
                div.className = "choice-item";
                div.innerHTML = `<div class="choice-label">${item.replace(/_/g, " ")}</div>`;

                data.options.forEach((opt, i) => {
                    const ingredients = Object.entries(opt.ingredients)
                        .map(([k, v]) => `${v}x ${k.replace(/_/g, " ")}`)
                        .join(", ");
                    div.innerHTML += `
                        <label class="choice-option">
                            <input type="radio" name="choice_${item}" value="${opt.index}" ${i === 0 ? "checked" : ""}>
                            ${ingredients} → ${opt.output} ${item.replace(/_/g, " ")}
                        </label>`;
                });

                choicesList.appendChild(div);
            }

            document.getElementById("choices-panel").classList.remove("hidden");
            document.getElementById("choices-panel").scrollIntoView({ behavior: "smooth" });
        }

        async function confirmCalculate() {
            const choices = {};
            document.querySelectorAll("[name^='choice_']").forEach(radio => {
                if (radio.checked) {
                    const item = radio.name.replace("choice_", "");
                    choices[item] = radio.value;
                }
            });

            const response = await fetch("/calculate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: pendingItems, choices })
            });

            const results = await response.json();
            const div = document.getElementById("results");
            const panel = document.getElementById("results-panel");

            div.innerHTML = "";
            results.forEach(r => {
                div.innerHTML += `
                    <div class="result-item">
                        <span class="material-name">${r.material.replace(/_/g, " ")}</span>
                        <div>
                            <div class="material-amount">${r.amount} items</div>
                            <div class="material-stacks">${r.formatted}</div>
                        </div>
                    </div>`;
            });

            document.getElementById("choices-panel").classList.add("hidden");
            panel.classList.remove("hidden");
            panel.scrollIntoView({ behavior: "smooth" });
        }

        function addIngredient() {
            const list = document.getElementById("ingredient-list");
            const first = list.querySelector(".row");
            const newRow = first.cloneNode(true);
            newRow.querySelector("input[name='ingredient-name']").value = "";
            newRow.querySelector("input[name='ingredient-amount']").value = 1;
            list.appendChild(newRow);
        }

        function removeIngredient(btn) {
            const list = document.getElementById("ingredient-list");
            if (list.querySelectorAll(".row").length > 1) {
                btn.parentElement.remove();
            }
        }

        async function saveRecipe() {
            const itemName = document.getElementById("new-item-name").value.trim();
            const output = parseInt(document.getElementById("new-item-output").value);
            const msg = document.getElementById("recipe-message");

            if (!itemName) {
                msg.style.display = "block";
                msg.style.color = "#FF4444";
                msg.textContent = "✕ Please enter an item name!";
                return;
            }

            const rows = document.querySelectorAll("#ingredient-list .row");
            const ingredients = [];
            rows.forEach(row => {
                const name = row.querySelector("input[name='ingredient-name']").value.trim();
                const amount = parseInt(row.querySelector("input[name='ingredient-amount']").value);
                if (name) ingredients.push({ name, amount });
            });

            if (ingredients.length === 0) {
                msg.style.display = "block";
                msg.style.color = "#FF4444";
                msg.textContent = "✕ Please add at least one ingredient!";
                return;
            }

            const response = await fetch("/add_recipe", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ item_name: itemName, output, ingredients })
            });

            const result = await response.json();
            if (result.success) {
                msg.style.display = "block";
                msg.style.color = "#5D8A2C";
                msg.textContent = "✓ Recipe saved! Reload the page to use it.";
                document.getElementById("new-item-name").value = "";
                document.getElementById("new-item-output").value = 1;
            }
        }

        async function toggleRecipeEditor() {
            const panel = document.getElementById("recipe-editor");
            const label = document.getElementById("recipe-editor-toggle-label");

            if (panel.classList.contains("hidden")) {
                await loadRecipeEditor();
                panel.classList.remove("hidden");
                label.textContent = "- View / Edit Recipes";
            } else {
                panel.classList.add("hidden");
                label.textContent = "+ View / Edit Recipes";
            }
        }

        async function loadRecipeEditor() {
            const response = await fetch("/");
            const parser = new DOMParser();
            const recipes = await fetch("/get_choices", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: [] })
            });

            const recipeResponse = await fetch("/get_all_recipes");
            const allRecipes = await recipeResponse.json();

            const list = document.getElementById("recipe-editor-list");
            list.innerHTML = "";

            for (const [itemName, itemData] of Object.entries(allRecipes)) {
                const card = document.createElement("div");
                card.className = "recipe-card";
                card.id = `recipe-card-${itemName}`;

                let variantsHTML = itemData.recipes.map((recipe, i) => {
                    const ingredients = Object.entries(recipe)
                        .filter(([k]) => k !== "output")
                        .map(([k, v]) => `${v}x ${k.replace(/_/g, " ")}`)
                        .join(", ");
                    return `
                        <div class="recipe-variant" id="recipe-variant-${itemName}-${i}">
                            <span>${ingredients} → ${recipe.output}x ${itemName.replace(/_/g, " ")}</span>
                            <div class="recipe-variant-actions">
                                <button class="btn btn-ghost btn-sm" onclick="showEditForm('${itemName}', ${i})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteRecipe('${itemName}', ${i})">Delete</button>
                            </div>
                        </div>
                        <div class="recipe-edit-form hidden" id="edit-form-${itemName}-${i}">
                            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">Output amount</div>
                            <input type="number" id="edit-output-${itemName}-${i}" value="${recipe.output}" min="1" style="width: 100%; margin-bottom: 10px; flex: none;">
                            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">Ingredients</div>
                            <div id="edit-ingredients-${itemName}-${i}">
                                ${Object.entries(recipe).filter(([k]) => k !== "output").map(([k, v]) => `
                                    <div class="recipe-edit-row">
                                        <input type="text" name="edit-ingredient-name" value="${k}">
                                        <input type="number" name="edit-ingredient-amount" value="${v}">
                                        <button class="btn btn-danger btn-sm" onclick="removeEditIngredient(this)">✕</button>
                                    </div>
                                `).join("")}
                            </div>
                            <button class="btn btn-ghost btn-sm" style="margin-top: 4px;" onclick="addEditIngredient('${itemName}', ${i})">+ Add Ingredient</button>
                            <div style="display: flex; gap: 8px; margin-top: 12px;">
                                <button class="btn btn-primary btn-sm" onclick="saveEdit('${itemName}', ${i})">Save</button>
                                <button class="btn btn-ghost btn-sm" onclick="cancelEdit('${itemName}', ${i})">Cancel</button>
                            </div>
                        </div>`;
                }).join("");

                card.innerHTML = `<div class="recipe-card-title">${itemName.replace(/_/g, " ")}</div>${variantsHTML}`;
                list.appendChild(card);
            }
        }

        function showEditForm(itemName, index) {
            document.getElementById(`edit-form-${itemName}-${index}`).classList.remove("hidden");
        }

        function cancelEdit(itemName, index) {
            document.getElementById(`edit-form-${itemName}-${index}`).classList.add("hidden");
        }

        function removeEditIngredient(btn) {
            const list = btn.parentElement.parentElement;
            if (list.querySelectorAll(".recipe-edit-row").length > 1) {
                btn.parentElement.remove();
            }
        }

        function addEditIngredient(itemName, index) {
            const list = document.getElementById(`edit-ingredients-${itemName}-${index}`);
            const row = document.createElement("div");
            row.className = "recipe-edit-row";
            row.innerHTML = `
                <input type="text" name="edit-ingredient-name" value="">
                <input type="number" name="edit-ingredient-amount" value="1">
                <button class="btn btn-danger btn-sm" onclick="removeEditIngredient(this)">✕</button>`;
            list.appendChild(row);
        }

        async function saveEdit(itemName, index) {
            const output = parseInt(document.getElementById(`edit-output-${itemName}-${index}`).value);
            const rows = document.querySelectorAll(`#edit-ingredients-${itemName}-${index} .recipe-edit-row`);
            const ingredients = [];
            rows.forEach(row => {
                const name = row.querySelector("input[name='edit-ingredient-name']").value.trim();
                const amount = parseInt(row.querySelector("input[name='edit-ingredient-amount']").value);
                if (name) ingredients.push({ name, amount });
            });

            await fetch("/edit_recipe", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ item_name: itemName, variant_index: index, output, ingredients })
            });

            await loadRecipeEditor();
        }

        async function deleteRecipe(itemName, index) {
            if (!confirm(`Delete this recipe variant for "${itemName.replace(/_/g, " ")}"?`)) return;

            await fetch("/delete_recipe", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ item_name: itemName, variant_index: index })
            });

            await loadRecipeEditor();
        }

        async function saveCurrentList() {
            const rows = document.querySelectorAll("#item-list .row");
            const items = [];
            rows.forEach(row => {
                const item = row.querySelector("select").value;
                const quantity = parseInt(row.querySelector("input").value);
                if (quantity > 0) items.push({ item, quantity });
            });

            if (items.length === 0) {
                alert("Your shopping list is empty!");
                return;
            }

            const name = prompt("Name this list:");
            if (!name || !name.trim()) return;

            const response = await fetch("/save_list", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name.trim(), items })
            });

            const result = await response.json();
            if (result.success) {
                alert(`"${name}" saved!`);
                if (!document.getElementById("saved-lists-panel").classList.contains("hidden")) {
                    await loadSavedLists();
                }
            }
        }

        async function toggleSavedLists() {
            const panel = document.getElementById("saved-lists-panel");
            const label = document.getElementById("saved-lists-toggle-label");

            if (panel.classList.contains("hidden")) {
                await loadSavedLists();
                panel.classList.remove("hidden");
                label.textContent = "- Saved Lists";
            } else {
                panel.classList.add("hidden");
                label.textContent = "+ Saved Lists";
            }
        }

        async function loadSavedLists() {
            const response = await fetch("/get_all_lists");
            const lists = await response.json();
            const content = document.getElementById("saved-lists-content");
            content.innerHTML = "";

            if (Object.keys(lists).length === 0) {
                content.innerHTML = '<div class="empty-state">No saved lists yet</div>';
                return;
            }

            for (const [name, data] of Object.entries(lists)) {
                const summary = data.items.map(i => `${i.quantity}x ${i.item.replace(/_/g, " ")}`).join(", ");
                const card = document.createElement("div");
                card.className = "list-card";
                card.innerHTML = `
                    <div style="flex: 1; min-width: 0;">
                        <div class="list-card-name">${name}</div>
                        <div class="list-card-items">${summary}</div>
                    </div>
                    <div class="list-card-actions">
                        <button class="btn btn-ghost btn-sm" onclick="loadList('${name}')">Load</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteList('${name}')">Delete</button>
                    </div>`;
                content.appendChild(card);
            }
        }

        async function loadList(name) {
            const response = await fetch("/get_all_lists");
            const lists = await response.json();
            const list = lists[name];

            if (!list) return;

            const choices = {};
            const calcResponse = await fetch("/calculate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: list.items, choices })
            });

            const results = await calcResponse.json();
            const div = document.getElementById("results");
            const panel = document.getElementById("results-panel");

            div.innerHTML = "";
            results.forEach(r => {
                div.innerHTML += `
                    <div class="result-item">
                        <span class="material-name">${r.material.replace(/_/g, " ")}</span>
                        <div>
                            <div class="material-amount">${r.amount} items</div>
                            <div class="material-stacks">${r.formatted}</div>
                        </div>
                    </div>`;
            });

            panel.classList.remove("hidden");
            panel.scrollIntoView({ behavior: "smooth" });
        }

        function createBlankRow() {
            const row = document.createElement("div");
            row.className = "row";
            row.innerHTML = `
                <select name="item">
                    ${Array.from(document.querySelectorAll("#item-list select")[0].options)
                        .map(o => `<option value="${o.value}">${o.text}</option>`).join("")}
                </select>
                <input type="number" name="quantity" value="1" min="1">
                <button class="btn btn-danger" onclick="removeRow(this)">✕</button>`;
            return row;
        }

        async function deleteList(name) {
            if (!confirm(`Delete "${name}"?`)) return;

            await fetch("/delete_list", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name })
            });

            await loadSavedLists();
        }
    </script>
</body>
</html>
